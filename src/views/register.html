<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta | Meu Barbeiro</title>

<link rel="stylesheet" href="../public/css/style.css">
</head>

<body>

<div class="auth-container">

    <div class="auth-box">

        <div class="auth-header">
            <h1>Meu Barbeiro</h1>
            <p>Crie sua conta</p>a
        </div>

        <form class="form active" id="registerForm">

            <h2>Criar Conta</h2>

            <!-- TIPO -->
            <div class="tipo-conta">
                <label><input type="radio" name="tipo" value="usuario" checked> Usuário</label>
                <label><input type="radio" name="tipo" value="barbearia"> Barbearia</label>
            </div>

            <!-- USUÁRIO -->
            <div id="camposUsuario">

                <div class="input-group">
                    <input type="text" required placeholder=" ">
                    <label>Nome completo</label>
                </div>

            </div>

            <!-- EMAIL (AMBOS) -->
            <div class="input-group">
                <input type="email" required placeholder=" ">
                <label>Email</label>
            </div>

            <!-- BARBEARIA -->
            <div id="camposBarbearia" style="display:none;">

                <div class="input-group">
                    <input type="text" id="nomeBarbearia" placeholder=" ">
                    <label>Nome da Barbearia</label>
                </div>

                <div class="input-group">
                    <input type="text" id="cep" maxlength="9" placeholder=" ">
                    <label>CEP</label>
                </div>

                <div class="input-group">
                    <input type="text" id="rua" readonly placeholder=" ">
                    <label>Rua</label>
                </div>

                <div class="input-group">
                    <input type="text" id="numero" placeholder=" ">
                    <label>Número</label>
                </div>

                <div class="input-group">
                    <input type="text" id="cnpj" placeholder=" ">
                    <label>CNPJ (opcional)</label>
                </div>

            </div>

            <!-- SENHA -->
            <div class="input-group">
                <input type="password" id="senha" required placeholder=" ">
                <label>Senha</label>
                <span class="toggle" onclick="toggleSenha('senha')">👁️</span>
            </div>

            <div class="input-group">
                <input type="password" id="confirmarSenha" required placeholder=" ">
                <label>Confirmar senha</label>
                <span class="toggle" onclick="toggleSenha('confirmarSenha')">👁️</span>
            </div>

            <small id="erroSenha"></small>

            <button type="submit">Cadastrar</button>

        </form>
        <p class="switch">
            Já tem uma conta?
            <a href="login.html">Entrar</a>
        </p>
    </div>

</div>

<script>
    document.getElementById("cep").addEventListener("blur", async () => {
    const cep = document.getElementById("cep").value.replace(/\D/g, '');

    if (cep.length !== 8) return;

    try {
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await res.json();

        if (!data.erro) {
            document.getElementById("rua").value = data.logradouro;
        }
    } catch (err) {
        console.log("Erro ao buscar CEP");
    }
});

// 🔒 validação
document.getElementById("registerForm").addEventListener("submit", function(e) {

    const senha = document.getElementById("senha").value;
    const confirmar = document.getElementById("confirmarSenha").value;
    const erro = document.getElementById("erroSenha");
    const tipo = document.querySelector('input[name="tipo"]:checked').value;

    const regra = /^(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{6,}$/;

    if (!regra.test(senha)) {
        e.preventDefault();
        erro.textContent = "Senha fraca.";
        return;
    }

    if (senha !== confirmar) {
        e.preventDefault();
        erro.textContent = "As senhas não coincidem.";
        return;
    }

    if (tipo === "barbearia") {
        const nome = document.getElementById("nomeBarbearia").value;
        const cep = document.getElementById("cep").value;
        const numero = document.getElementById("numero").value;

        if (!nome || !cep || !numero) {
            e.preventDefault();
            erro.textContent = "Preencha os dados da barbearia.";
            return;
        }
    }

    erro.textContent = "";
});

document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const tipo = document.querySelector('input[name="tipo"]:checked').value;

    const data = {
        username: document.querySelector('#camposUsuario input')?.value,
        email: document.querySelector('input[type="email"]').value,
        password: document.getElementById("senha").value,
        role: tipo,

        nomeBarbearia: document.getElementById("nomeBarbearia")?.value,
        cep: document.getElementById("cep")?.value,
        rua: document.getElementById("rua")?.value,
        numero: document.getElementById("numero")?.value,
        cnpj: document.getElementById("cnpj")?.value
    };

    const res = await fetch("/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if (!res.ok) {
        alert(result.message);
        return;
    }

    alert("Conta criada com sucesso!");
});
</script>

</body>
</html>
